<div class="rubiks-wrapper">
  <div #host class="rubiks-host"></div>

  <div class="rubiks-ui">
    <div class="rubiks-actions">
      <button type="button" (click)="scramble()">Scramble</button>
      <button type="button" (click)="reset()">Reset</button>
    </div>
    <div class="rubiks-help">
      <strong>Controls</strong>
      <ul>
        <li>Drag background — rotate camera</li>
        <li>Drag a face — turn that slice</li>
        <li><kbd>F</kbd> <kbd>B</kbd> <kbd>U</kbd> <kbd>D</kbd> <kbd>L</kbd> <kbd>R</kbd> — turn faces</li>
        <li><kbd>Shift</kbd> + key — reverse turn</li>
      </ul>
    </div>
  </div>
</div>

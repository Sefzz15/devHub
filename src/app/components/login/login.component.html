<div class="login-container">
  <h2>{{ 'login.title' | translate }}</h2>
  <form (ngSubmit)="onSubmit()">
    <!-- Username Field -->
    <div class="input-container">
      <label for="username">{{ 'login.username' | translate }}</label>
      <input class="input-field" type="text" id="username" [ngModel]="username()"
        (ngModelChange)="username.set($event)" name="username" required>
      <!-- Error Message for Username -->
      @if (usernameError()) {
        <div class="error">{{ usernameError() }}</div>
      }
    </div>

    <!-- Password Field -->
    <div class="input-container">
      <label for="password">{{ 'login.password' | translate }}</label>
      <input class="input-field" id="password" type="password" [ngModel]="password()"
        (ngModelChange)="password.set($event)" name="password" required>
      <!-- Error Message for Password -->
      @if (passwordError()) {
        <div class="error">{{ passwordError() }}</div>
      }
    </div>

    <!-- General Error Message -->
    @if (generalError()) {
      <div class="error">{{ generalError() }}</div>
    }

    <!-- Submit Button -->
    <div>
      <button class="loginButton" type="submit">{{ 'login.submit' | translate }}</button>
    </div>

    <!-- Link to Create User Page -->
    <div>
      <a class="btn btn-primary mb-3" routerLink="../entity-form/user">{{ 'login.newUser' | translate }}</a>
    </div>
  </form>
</div>
